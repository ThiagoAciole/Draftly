name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restaurar cache do Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Instalar dependências
        run: npm ci

      - name: Gerar aplicação Windows
        run: npm run tauri:build

      - name: Guardar executável portátil
        uses: actions/upload-artifact@v4
        with:
          name: draftly-windows-portable
          path: src-tauri/target/release/Draftly.exe
          if-no-files-found: error

      - name: Guardar instalador Windows
        uses: actions/upload-artifact@v4
        with:
          name: draftly-windows-setup
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  build-linux:
    name: Linux (.deb)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restaurar cache do Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Instalar dependências
        run: npm ci

      - name: Gerar pacote Debian
        run: npm run tauri:build

      - name: Guardar pacote Debian
        uses: actions/upload-artifact@v4
        with:
          name: draftly-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    name: Publicar release
    needs: [build-windows, build-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Criar release no GitHub
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          files: release-assets/**
